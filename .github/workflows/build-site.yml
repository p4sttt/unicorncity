name: Build notes site

on:
  workflow_dispatch:
    inputs:
      notegen_image:
        description: Docker image tag to use for the frontend build
        required: false
        default: ghcr.io/p4sttt/notegen:latest
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTEGEN_IMAGE: ${{ github.event.inputs.notegen_image || 'ghcr.io/p4sttt/notegen:latest' }}
    steps:
      - name: Checkout notes
        uses: actions/checkout@v4
        with:
          path: vault

      - name: Build static site
        run: |
          mkdir -p site
          docker run --rm \
            -v "$PWD/vault:/vault:ro" \
            -v "$PWD/site:/out" \
            -e ASTRO_SITE="https://${{ github.repository_owner }}.github.io" \
            -e ASTRO_BASE="/${{ github.event.repository.name }}" \
            "$NOTEGEN_IMAGE"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
